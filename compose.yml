services:
  cubyz-map-viewer:
    build:
      context: .
      dockerfile: Dockerfile
    image: cubyz-map-viewer:latest
    ports:
      - "3000:3000"
    environment:
      HOST: 0.0.0.0
      PORT: 3000
      SAVE_PATH: /data/save
      CUBYZ_PATH: /data/cubyz
      VOXEL_CACHE_DIR: /data/cache/voxels
      LOG_DIR: /data/logs
      CACHE_SIZE: 500
    volumes:
      - type: bind
        source: /path/to/your/save
        target: /data/save
        read_only: true
      - type: bind
        source: /path/to/Cubyz
        target: /data/cubyz
        read_only: true
      - type: volume
        source: cubyz-map-viewer-cache
        target: /data/cache
      - type: volume
        source: cubyz-map-viewer-logs
        target: /data/logs
    restart: unless-stopped

volumes:
  cubyz-map-viewer-cache:
  cubyz-map-viewer-logs:
